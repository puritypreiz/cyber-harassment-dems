<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SafeProof Evidence Manager{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <div class="brand-section">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SafeProof Logo" class="navbar-logo" onerror="this.style.display='none'" />
      <span class="brand">SafeProof Evidence Manager</span>
    </div>
    <div id="nav-links">
      <a href="/">Home</a>
      <a href="/dashboard" id="nav-dashboard">Dashboard</a>
      <a href="/login" id="nav-login">Log in</a>
      <a href="/register" id="nav-register">Register</a>
      <a href="#" id="nav-logout" class="hidden">Log out</a>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    SafeProof Evidence Manager &middot; Encrypted, tamper-evident, survivor-centered.
  </footer>

  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/nav.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
