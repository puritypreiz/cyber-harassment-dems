<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cyber Harassment DEMS{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <div><span class="brand">Cyber Harassment DEMS</span></div>
    <div id="nav-links">
      <a href="/">Home</a>
      <a href="/dashboard" id="nav-dashboard">Dashboard</a>
      <a href="/login" id="nav-login">Log in</a>
      <a href="/register" id="nav-register">Register</a>
      <a href="#" id="nav-logout" class="hidden">Log out</a>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    Digital Evidence Management System &middot; Encrypted, tamper-evident, survivor-centered.
  </footer>

  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script>
    (function () {
      const user = DEMS.getUser();
      const logoutLink = document.getElementById("nav-logout");
      const loginLink = document.getElementById("nav-login");
      const registerLink = document.getElementById("nav-register");
      if (user) {
        loginLink.classList.add("hidden");
        registerLink.classList.add("hidden");
        logoutLink.classList.remove("hidden");
        logoutLink.addEventListener("click", async (e) => {
          e.preventDefault();
          try { await DEMS.request("/api/auth/logout", { method: "POST" }); } catch (_err) {}
          DEMS.clearSession();
          window.location.href = "/";
        });
      }
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
