{% extends "base.html" %}
{% block title %}Log in - SafeProof Evidence Manager{% endblock %}
{% block content %}
<div class="card" style="max-width:420px;margin:0 auto;">
  <h1>Log in</h1>
  <div id="login-alert"></div>
  <label for="username_or_email">Username or email</label>
  <input type="text" id="username_or_email" autocomplete="username" />
  <label for="password">Password</label>
  <input type="password" id="password" autocomplete="current-password" />
  <div id="mfa-field" class="hidden">
    <label for="totp_code">Multi-factor authentication code</label>
    <input type="text" id="totp_code" inputmode="numeric" maxlength="6" />
  </div>
  <button id="login-btn" class="btn" style="margin-top:1rem;width:100%;">Log in</button>
  <p class="form-help">No account? <a href="/register">Register here</a>.</p>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/pages/login.js') }}"></script>
{% endblock %}
