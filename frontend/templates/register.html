{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:0 auto;">
  <h1>Create an account</h1>
  <div id="register-alert"></div>
  <label for="username">Username</label>
  <input type="text" id="username" autocomplete="username" />
  <label for="email">Email</label>
  <input type="email" id="email" autocomplete="email" />
  <label for="password">Password</label>
  <input type="password" id="password" autocomplete="new-password" />
  <p class="form-help">At least 10 characters, with uppercase, lowercase, a digit, and a special character.</p>
  <button id="register-btn" class="btn" style="margin-top:0.5rem;width:100%;">Create account</button>
  <p class="form-help">Already have an account? <a href="/login">Log in</a>.</p>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/pages/register.js') }}"></script>
{% endblock %}
